<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>What's the Catch?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --bg: #0f172a;
        --bg-elevated: #020617;
        --card: #020617;
        --border: #1f2937;
        --accent: #f59e0b;
        --accent-soft: rgba(245, 158, 11, 0.15);
        --text: #e5e7eb;
        --muted: #9ca3af;
        --danger: #f97373;
        --green: #4ade80;
        --green-soft: rgba(74, 222, 128, 0.15);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1f2937 0, #020617 50%, #000 100%);
        color: var(--text);
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr);
        gap: 24px;
        width: 100%;
        max-width: 1260px;
        background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.9));
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow:
          0 22px 60px rgba(15, 23, 42, 0.85),
          0 0 0 1px rgba(15, 23, 42, 0.9);
        overflow: hidden;
        backdrop-filter: blur(20px);
      }

      .left-pane,
      .right-pane {
        padding: 20px 22px;
        overflow: auto;
      }

      .left-pane {
        border-right: 1px solid rgba(31, 41, 55, 0.85);
        background: radial-gradient(circle at top left, #020617 0, #020617 45%, #020617 100%);
      }

      .right-pane {
        background: radial-gradient(circle at top right, #020617 0, #020617 45%, #020617 100%);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .title-block {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: radial-gradient(circle at 20% 20%, #f59e0b, #d97706 45%, #92400e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0 0 1px rgba(245, 158, 11, 0.6),
          0 8px 22px rgba(146, 64, 14, 0.9);
        font-weight: 700;
        font-size: 18px;
        color: #fef3c7;
      }

      h1 {
        font-size: 19px;
        margin: 0;
        letter-spacing: 0.03em;
      }

      .subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        font-size: 11px;
        color: var(--muted);
        background: radial-gradient(circle at top left, #020617 0, #020617 50%, #020617 100%);
        white-space: nowrap;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
        color: var(--muted);
      }

      .field {
        background: radial-gradient(circle at top left, #020617 0, #020617 50%, #020617 100%);
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 10px 10px 8px;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
      }

      .field:focus-within {
        border-color: rgba(245, 158, 11, 0.9);
        box-shadow:
          0 0 0 1px rgba(245, 158, 11, 0.5),
          0 0 0 8px rgba(245, 158, 11, 0.07);
      }

      textarea {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        resize: vertical;
        min-height: 100px;
      }

      textarea::placeholder {
        color: #4b5563;
      }

      .controls-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
      }

      .btn-primary {
        border: none;
        outline: none;
        border-radius: 999px;
        padding: 9px 16px;
        font-size: 13px;
        font-weight: 500;
        color: #1c1917;
        background: radial-gradient(circle at 20% 0, #f59e0b, #d97706 50%, #92400e 100%);
        box-shadow:
          0 12px 25px rgba(146, 64, 14, 0.9),
          0 0 0 1px rgba(245, 158, 11, 0.6);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition:
          transform 0.08s ease,
          box-shadow 0.08s ease,
          filter 0.08s ease;
      }

      .btn-primary:hover {
        transform: translateY(-0.5px);
        filter: brightness(1.08);
        box-shadow:
          0 16px 32px rgba(146, 64, 14, 0.95),
          0 0 0 1px rgba(245, 158, 11, 0.7);
      }

      .btn-primary:active {
        transform: translateY(0.5px) scale(0.99);
      }

      .btn-primary[disabled] {
        opacity: 0.7;
        cursor: wait;
        box-shadow: none;
      }

      .status {
        margin-top: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .status.error { color: var(--danger); }

      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 16px;
      }

      .results-title {
        font-size: 14px;
        font-weight: 500;
      }

      .results-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .empty-state {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .catches-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .catch-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(31, 41, 55, 0.9);
        background: radial-gradient(circle at top left, rgba(15, 23, 42, 1) 0, #020617 55%, #020617 100%);
        font-size: 13px;
        line-height: 1.6;
      }

      .catch-num {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
      }

      .catch-text {
        flex: 1;
      }

      .nuanced-section {
        margin-top: 20px;
        padding: 16px 18px;
        border-radius: 12px;
        border: 1px solid rgba(74, 222, 128, 0.3);
        background: rgba(74, 222, 128, 0.06);
        font-size: 13px;
        line-height: 1.7;
      }

      .nuanced-label {
        font-size: 11px;
        font-weight: 600;
        color: #4ade80;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }

      @media (max-width: 900px) {
        body { padding: 12px; }
        .app-shell { grid-template-columns: minmax(0, 1fr); }
        .left-pane {
          border-right: none;
          border-bottom: 1px solid rgba(31, 41, 55, 0.85);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <section class="left-pane">
        <header class="header">
          <div class="title-block">
            <div class="logo">?</div>
            <div>
              <h1>What's the Catch?</h1>
              <div class="subtitle">Surface the downsides people often miss.</div>
            </div>
          </div>
          <div class="badge">Standalone</div>
        </header>

        <form id="catch-form" class="form-grid">
          <div class="field">
            <label for="claim">Popular belief, trend, or product</label>
            <textarea id="claim" rows="4" placeholder="e.g. remote work, AI will replace writers, crypto, intermittent fasting"></textarea>
          </div>

          <div class="controls-row">
            <span></span>
            <button type="submit" class="btn-primary" id="submit-btn">
              <span id="submit-label">What's the catch?</span>
              <span id="submit-spinner" style="display:none">...</span>
            </button>
          </div>

          <div id="status" class="status"></div>
        </form>
      </section>

      <section class="right-pane">
        <div class="results-header">
          <div class="results-title">Catches &amp; Nuanced Take</div>
          <div class="results-meta" id="results-meta">Nothing yet.</div>
        </div>
        <div id="results" class="catches-list"></div>
        <div id="nuanced" class="nuanced-section" style="display:none">
          <div class="nuanced-label">Nuanced take</div>
          <div id="nuanced-text"></div>
        </div>
        <div class="empty-state" id="empty-state">
          Enter a popular belief, trend, or product on the left, then hit
          <strong>What's the catch?</strong> to see downsides, caveats, and counterpoints people often miss — plus one balanced take.
        </div>
      </section>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
